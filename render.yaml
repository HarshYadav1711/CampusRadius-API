# Render Blueprint — https://render.com/docs/blueprint-spec
# After first deploy, add DB_* secrets in the Render dashboard (never commit passwords).

services:
  - type: web
    name: campus-radius-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
